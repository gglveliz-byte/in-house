<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col items-center justify-start">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-surface-dim flex items-center justify-between px-margin-mobile h-16 max-w-md mx-auto active:scale-95 transition-transform hover:bg-surface-container-high transition-colors">

<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="location_on">location_on</span>
</button>
<h1 class="font-headline-sm text-headline-sm-mobile text-primary font-bold truncate px-4">
            Dirección de entrega
        </h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md mt-16 mb-24 px-margin-mobile pt-stack-lg flex flex-col gap-stack-lg">
<!-- Add New Address Action -->
<button class="w-full flex items-center gap-gutter-mobile p-stack-md bg-surface-container-lowest border-2 border-dashed border-outline-variant rounded-xl hover:bg-surface-container-low hover:border-primary transition-all group active:scale-95">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-primary group-hover:text-on-primary" data-icon="add_location">add_location</span>
</div>
<div class="flex flex-col items-start">
<span class="font-headline-sm text-headline-sm text-primary">Agregar nueva dirección</span>
<span class="font-body-md text-body-md text-secondary">Añadir otra ubicación de entrega</span>
</div>
</button>
<!-- Saved Addresses Section -->

<h2 class="font-label-md text-label-md text-secondary uppercase tracking-wider mb-stack-sm">Guardadas</h2>
<!-- Card: Casa (Active/Selected) -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.06)] overflow-hidden border border-primary relative">
<!-- Selection Indicator -->
<div class="absolute top-3 right-3 w-6 h-6 rounded-full bg-primary flex items-center justify-center z-10 shadow-sm">
<span class="material-symbols-outlined icon-fill text-on-primary text-[16px]" data-icon="check">check</span>
</div>

</div>
<!-- Address Details -->
<div class="p-stack-md flex gap-gutter-mobile items-start">
<div class="mt-1">
<span class="material-symbols-outlined icon-fill text-primary text-[28px]" data-icon="home">home</span>
</div>
<div class="flex flex-col flex-1">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Casa</h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-stack-sm line-clamp-2">Av. de la Libertad 123, Piso 4, Depto B. Centro, Ciudad.</p>
<p class="font-body-md text-body-md text-secondary mt-1">Instrucciones: Dejar en portería.</p>
<div class="flex gap-stack-md mt-stack-md">
<button class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors uppercase">Editar</button>
</div>
</div>
</div>
</div>
<!-- Card: Trabajo -->

<div class="mt-1">
<span class="material-symbols-outlined text-secondary text-[28px]" data-icon="work">work</span>
</div>
<div class="flex flex-col flex-1">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Trabajo</h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-stack-sm line-clamp-2">Torre Empresarial, Calle Comercio 450, Oficina 102.</p>

</div>
</div>
