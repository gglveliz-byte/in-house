<!-- Top Navigation (Transactional Back Header) -->
<header class="fixed top-0 w-full z-50 bg-surface h-16 flex items-center px-margin-mobile">
<button aria-label="Volver" class="p-2 -ml-2 rounded-full hover:bg-surface-container-high transition-colors">

</button>
<h1 class="ml-4 font-headline-md text-headline-md text-on-surface">Tu Carrito</h1>
</header>
<main class="pt-20 px-margin-mobile max-w-md mx-auto">

<div>

<h3 class="font-headline-sm text-headline-sm text-on-surface">Hamburguesa Clásica</h3>
<button aria-label="Eliminar" class="text-outline hover:text-error transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">delete</span>
</button>
</div>
<p class="font-body-md text-body-md text-secondary mt-1">Sin cebolla, salsa extra</p>
</div>
<div class="flex justify-between items-center mt-3">
<span class="font-headline-sm text-headline-sm text-primary">$12.50</span>
<div class="flex items-center gap-3 bg-surface-container rounded-full px-2 py-1">
<button aria-label="Disminuir cantidad" class="w-6 h-6 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-high">
<span class="material-symbols-outlined" style="font-size: 18px;">remove</span>
</button>
<span class="font-body-md text-body-md text-on-surface font-medium w-4 text-center">1</span>
<button aria-label="Aumentar cantidad" class="w-6 h-6 flex items-center justify-center rounded-full bg-secondary-container text-on-secondary-container">
<span class="material-symbols-outlined" style="font-size: 18px;">add</span>
</button>
</div>
</div>
</div>
</div>

<div>

<span class="material-symbols-outlined" style="font-size: 20px;">delete</span>

</div>
<p class="font-body-md text-body-md text-secondary mt-1">Tamaño Mediano</p>

<div class="flex justify-between items-center mt-3">
<span class="font-headline-sm text-headline-sm text-primary">$4.00</span>

<button aria-label="Disminuir cantidad" class="w-6 h-6 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-high">
<span class="material-symbols-outlined" style="font-size: 18px;">remove</span>
</button>
<span class="font-body-md text-body-md text-on-surface font-medium w-4 text-center">2</span>
<button aria-label="Aumentar cantidad" class="w-6 h-6 flex items-center justify-center rounded-full bg-secondary-container text-on-secondary-container">
<span class="material-symbols-outlined" style="font-size: 18px;">add</span>
</button>
</div>
</div>
</div>
</div>
</section>

<div class="flex gap-4 overflow-x-auto no-scrollbar pb-4 -mx-margin-mobile px-margin-mobile">
<!-- Suggestion 1 -->
<div class="min-w-[140px] bg-surface-container-lowest rounded-lg p-stack-sm shadow-[0px_4px_12px_rgba(0,0,0,0.06)] flex flex-col border border-surface-variant">

<span class="material-symbols-outlined" style="font-size: 16px;">add</span>

<!-- Suggestion 2 -->
<div class="min-w-[140px] bg-surface-container-lowest rounded-lg p-stack-sm shadow-[0px_4px_12px_rgba(0,0,0,0.06)] flex flex-col border border-surface-variant">

<h4 class="font-label-md text-label-md text-on-surface truncate">Helado Vainilla</h4>
<span class="font-body-md text-body-md text-primary mt-1">$3.50</span>
<button class="mt-2 w-full bg-secondary-container text-on-secondary-container py-1.5 rounded-md font-label-md text-label-md flex items-center justify-center gap-1 transition-colors hover:bg-primary-fixed">
<span class="material-symbols-outlined" style="font-size: 16px;">add</span>
                        Añadir
                    </button>
</div>
</div>
</section>
<!-- Order Summary -->
<section class="mt-stack-lg bg-surface-container-lowest rounded-lg p-stack-md shadow-[0px_4px_12px_rgba(0,0,0,0.06)]">
<h3 class="font-headline-sm text-headline-sm text-on-surface mb-4">Resumen</h3>
<div class="flex flex-col gap-3">
<div class="flex justify-between items-center font-body-md text-body-md text-secondary">

<span>$20.50</span>
</div>
<div class="flex justify-between items-center font-body-md text-body-md text-secondary">

</div>

</div>
</div>
<hr class="border-t border-outline-variant my-4"/>
<div class="flex justify-between items-center">
<span class="font-headline-md text-headline-md text-on-surface">Total</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary">$24.00</span>
</div>

<div class="fixed bottom-0 w-full bg-surface-container-lowest px-margin-mobile py-4 shadow-[0px_-4px_12px_rgba(0,0,0,0.06)] z-50 pb-safe max-w-md left-1/2 -translate-x-1/2">
<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm py-3.5 rounded-lg active:scale-[0.98] transition-transform shadow-sm flex justify-center items-center gap-2">
            Continuar al pago

</button>
